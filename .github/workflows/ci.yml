# PR / merge-queue gate.
#
# Runs the quality gates (lint, unit tests, type-checked build) on pull requests
# and on merge-queue candidates. This is the required status check that protects
# `master`: a PR can only enter/leave the merge queue once `verify` is green.
#
# Deploys are NOT done here — see deploy.yml, which runs on push to master after a
# merge lands (or on a direct owner push).

name: ci

on:
  pull_request:
  merge_group:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build (type-check + bundle + PWA)
        run: npm run build
