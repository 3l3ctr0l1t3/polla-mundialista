# Auto-deploy to Firebase Hosting on every push to the default branch.
#
# Builds the app and deploys ONLY hosting (security rules / indexes are deployed
# deliberately by hand — we never want a routine push to rewrite the integrity
# backbone). Quality gates (lint, unit tests, type-checked build) run first, so a
# red push never ships.
#
# REUSES the secrets the ingest workflow already relies on (Settings → Secrets and
# variables → Actions):
#   - FIREBASE_SERVICE_ACCOUNT  the Firebase service-account JSON, pasted whole.
#   - FIREBASE_PROJECT_ID       the Firebase project id (la-pollita-corp).
# NOTE: that service account must have the "Firebase Hosting Admin" role (or Editor)
# for the deploy step to succeed. Grant it in Google Cloud IAM if the deploy 403s.

name: deploy

on:
  push:
    branches: [master]
    # Doc-only / spec-only pushes don't change the built app — skip the deploy.
    paths-ignore:
      - 'specs/**'
      - '**/*.md'
  workflow_dispatch:

# One live deploy at a time; a newer push supersedes an in-flight one.
concurrency:
  group: deploy-hosting
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build (type-check + bundle + PWA)
        run: npm run build

      - name: Write service-account key
        run: printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: npx --yes firebase-tools@latest deploy --only hosting --project "${{ secrets.FIREBASE_PROJECT_ID }}" --non-interactive
